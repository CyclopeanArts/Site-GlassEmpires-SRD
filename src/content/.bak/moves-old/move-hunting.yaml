name: Hunting
tags: [adventure, exploration, creatures]
summary: "Search for a specific creature in a biome where it's known to exist, with a Deadline based on the creature's Rarity Tier and a Hunting Save to determine the outcome."
rules: |
  **When a Party deliberately searches for a specific creature** in a biome where it's known to exist, the GM sets a Deadline based on the creature's Rarity Tier:

  | Rarity        | Examples                                     | Base Search Time | Population per Biome Region |
  | ------------- | -------------------------------------------- | ---------------- | --------------------------- |
  | **Common**    | Boar, wolf, monkey, spider, skittering horde | 1 day            | Dozens to hundreds          |
  | **Uncommon**  | Bear, toad, ant colony, therianthrope        | 3 days           | Several to a dozen          |
  | **Rare**      | Vanishing tiger, oni, forest witch, kappa    | 1 week           | A handful                   |
  | **Legendary** | Hydra, grootslang, phoenix, dragon tiger     | 1 month          | ~2–6 on all of Glass        |
  | **Unique**    | Three-Legged Owl, Simurgh, Great Stag        | 3 months+        | Exactly 1                   |

  The Deadline is modified by the local terrain's distance multiplier:

  | Type        | Examples                                                 | Distance Multiplier |
  | ----------- | -------------------------------------------------------- | :-----------------: |
  | Clear/road  | Plains, grasslands, farmland, highways & roads           |         ×1          |
  | Rough       | Hills, desert, marsh, forest                             |         ×2          |
  | Heavy       | Dunes, forested/snowy hills, swamp                       |         ×3          |
  | Mountainous | Mountain                                                 |         ×4          |
  | Extreme     | Forested/snowy mountain                                  |         ×5          |

  You may also receive benefits (stacked multiplicatively) based on how you're searching:

  | Factor                                       | Modifier | Why                                           |
  | -------------------------------------------- | :------: | --------------------------------------------- |
  | Tracker or hunter in party (relevant Fact)   |   ×0.5   | Knows signs, habits, trails                   |
  | Harpy aerial scout                           |   ×0.5   | Sees from above.                              |
  | Local knowledge (villagers, jesters)         |   ×0.5   | "The tiger drinks at the west fork at dawn"   |
  | Bait or lure appropriate to creature's Wants |   ×0.5   | The Wants line in every entry exists for this |
  | Searching the wrong biome                    |   N/A    | You won't find it. Period.                    |

  And penalties for:

  | Factor                           |                       Effect                       | Why                                                  |
  | -------------------------------- | :------------------------------------------------: | ---------------------------------------------------- |
  | More than 10 soldiers            | ×2 for Rare+ creatures, ×0.5 for Common & Uncommon | More soldiers don't help for finding apex predators. |
  | War in the area                  |                         ×2                         | Animals flee combat.                                 |
  | Night hunting without darkvision |             ×2 for nocturnal creatures             | You can't see; they can.                             |

  At the Deadline, the GM rolls a Hunting Save for the hunting party.

  |      Result      | Hunting Save Effects                                                    |
  | :--------------: | ----------------------------------------------------------------------- |
  |  Crit<br>*≥12*   | You find the creature (or its lair/territory).                          |
  |  Pass<br>*8–11*  | You find the creature (or its lair/territory).                          |
  |   Seven<br>*7*   | You find signs/tracks — spend another search period at half duration.   |
  | Failure<br>*3–6* | You found nothing, but learned something useful about why (depleted area, wrong season, someone else hunting it). |
  |  Fumble<br>*≤2*  | Something else found you first — GM rolls on the biome encounter table. |
