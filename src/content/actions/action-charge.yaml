name: Charge (Action)
tags: [combat, movement, skirmish]
duration: Instant
cost: Full-Turn Action
trigger: "When you move in a straight line to close distance and attack."
rules: |
  Move *at least* & *up to 3×* any of your Speed scores in a *straight unobstructed line* & then perform an Attack at the end as per the [[action-attack|Attack Action's rules]]. At the end of the Attack, the target, if less than half your Weight, must Save or [[condition-panicked|Panic]].
