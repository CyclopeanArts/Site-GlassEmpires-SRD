name: Mood
tags: [core, mechanics, social, npc]
summary: "NPC disposition — Friendly, Neutral, or Hostile — determining baseline social interactions."
definition: |
  NPCs can only be **Friendly**, **Neutral**, or **Hostile** towards any
  given actor, including Factions such as the Party, or individual PCs.

  **Shifting Moods**: When a character is *Angered* or *Pleased*, they move
  1 step up or down on the scale if it is appropriate in response to the
  trigger. A Neutral NPC who is Pleased becomes Friendly; a Friendly NPC who
  is Angered becomes Neutral.

  In addition, if a character is managing a Move (i.e., if they are Leaders
  of a Faction), they will also reconsider their priorities in light of
  whatever new information they have received and may adjust their Moves or
  other actions in response to it.

  Mood is the foundation of Glass's social mechanics — Persuasion and
  Negotiation Moves interact with it, and a character's Mood determines
  what kinds of interactions are possible before any dice are rolled.
related_rule: "adventure/sociology"
see_also: [faction, persuasion, negotiation, npc]
