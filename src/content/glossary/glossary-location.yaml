name: Location
tags: [map, campaign, exploration, core]
summary: "A point on the campaign map representing a notable feature — settlement, resource, dungeon, or landmark."
definition: |
  A **Location** is a point on the campaign map representing some kind of
  notable feature. Exceptionally large Locations or exceptionally small campaign
  maps may require marking of *areas* or *biomes* instead of individual points.

  Key Location types include:

  - **Settlement**: A Location permanently inhabited by one or more creatures
    operating a society. At least 1 Family must live at a Location for it to be
    considered a Settlement.

  - **Resource (Resource Node)**: A Location that, when settled, produces some
    form of trade goods of strategic significance — worth attacking, trading
    for, or securing with additional forces. Resources are distinct from
    generalized materials like food, which every Settlement produces in some
    quantity.

  - **Lair**: A Location where a specific Monster or group of Monsters nests,
    discovered during travel or through deliberate hunting.

  - **Dungeon**: A multi-room Location containing hazards, treasures, and
    adversaries, usually explored room-by-room.

  Every Location may have a **Structural HP** score representing its
  fortification capacity and durability.
related_rule: "adventure/travel"
see_also: [settlement, resource, structural-hit-points, map, lair, dungeon, exploration]
