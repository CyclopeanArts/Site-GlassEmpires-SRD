name: Level
tags: [characters, factions, core]
summary: "A measure of a character's or Faction's growth in power, granting access to Class Features and scaling Hit Dice."
definition: |
  **Level** measures a character's or Faction's growth in power and
  responsibility. When a Faction you lead grows past the *minimum Families
  threshold* required to support a Leader of the next Level up, and you do not
  yet have as many Class Features as your highest Faction Level, you may pick a
  Class Feature.

  **Class eligibility** is determined by what you have done recently and what
  Factions you currently lead. Each Class provides a method for selecting new
  Features on level-up.

  A character's **Power** score (used to calculate Armor Points and other
  derived values) is equal to HD + Level.

  **Faction Level** scales with the number of Families within the Faction. The
  Level determines the Faction's capabilities, Resource access, and the kinds of
  Moves it can undertake.
related_rule: "characters"
see_also: [character-creation, factions, class, hit-dice, power, families]
