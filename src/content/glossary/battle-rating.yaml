name: Battle Rating
tags: [combat, faction, economy]
summary: "A creature's or unit's relative combat effectiveness, used for army calculations."
# definition: the full definition text, displayed on the detail page
definition: |
  Battle Rating (BR) is a numerical score representing a creature's effectiveness in
  mass combat. It is derived from HD and combat-applicable Features:

    BR = HD × (1 + number of combat Features)

  Natural weapons do not count as Features for BR purposes. Niche or
  death-triggered Features count as fractions. BR is used to size armies, evaluate
  faction military strength, and determine combat outcomes at the unit scale.
related_rule: "combat/battle-rating"
see_also: [hd, faction-level]
