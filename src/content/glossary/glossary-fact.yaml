name: Fact
tags: [core, mechanics, character]
summary: "A true statement about a character granting or denying permission to attempt actions."
definition: |
  A Fact is a true statement about a character that grants permission or denies the
  possibility in the fiction to attempt related actions. Related Facts may also be
  *invoked* by any Player or the GM on Saves they're relevant to, adding a +1 bonus
  or −1 penalty to an actor's efforts.

  Facts are the fundamental building block of character definition in Glass Empires.
  If it's a bullet-point statement describing something true about a character, it's a Fact.

  **Examples:**
  - "Nervous when surrounded"
  - "Boulder-sized warty amphibian with a deceptively quick tongue"
  - "Because I was a Failed Student of Alchemy, I learned how to neutralize unstable situations"

  Conditions are a kind of temporary Fact. Features are a permanent kind of Fact with
  specific rules attached.
related_rule: "core/facts"
