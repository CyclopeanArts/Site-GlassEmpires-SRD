name: Move
tags: [core, mechanics, action]
summary: "Any action taken in-game by an actor; may be instant or extended with a Deadline."
definition: |
  A Move is any action taken in-game by an actor. Moves can be long or short-term actions;
  they may involve a chance of failure (and if they do, probably invoke a Save). They may
  involve movement, thinking, or long-term labor.

  Moves may be **instant** or **extended**:

  - An **instant** Move takes just a few seconds and is called an Action. These are mostly
    used in Skirmish combats but apply in any tense moment. A split-second reaction is
    worth one Minor Action.
  - An **extended** Move has a **Deadline** set some period into the future, often days or
    months out; until that Deadline is reached, the character dedicates all their time to
    continuing the Move and cannot perform other Moves.

  Characters who lead Factions may oversee their Faction performing a Move instead of
  taking Moves personally. If there is no Move for what you want to do, the GM determines
  reasonable outcomes; recurring needs may prompt the GM to construct new Moves.

  Actions are further split into Full-Turn, Major Action, Minor Action, and Free Action
  categories.
related_rule: "core/moves"
