name: Power
tags: [core, mechanics, character, combat]
summary: "A derived stat equal to a character's Hit Dice plus their Level (HD + Level)."
definition: |
  Power is a derived statistic equal to a character's **Hit Dice (HD) plus their
  Level**. It serves as the calculation base for several important derived values:

  - **Armor Points (AP)** = Armor × Power — determines your backup HP pool.
  - **Resting HP recovery** — the number of true rest conditions multiplied by Power
    determines how much HP is restored.
  - **Death threshold** — a character dies when their negative HP exceeds their Power
    after becoming Incapacitated.
  - **Exhaustion damage** — failed Exhaustion Saves during Travel deal Power × N HP.

  A typical human has HD 1; a Lv3 human Leader has Power 4. A Jiangshi (HD 4) has
  Power 4 unless it gains Levels as a Faction Leader.
related_rule: "core/power"
