name: Save
tags: [core, mechanics, dice]
summary: "A standardized 2d6 dice roll determining the outcome of uncertain, meaningful actions."
definition: |
  A Save is a standardized 2d6 dice roll made to determine the effect of actions whose
  outcome is both uncertain and meaningful. When figuring if a Save is required, consider
  if any applicable Facts make the task trivial or impossible — if so, the Save may be
  either unnecessary or pointless.

  **Procedure:**

  1. Add every distinct numeric bonus and penalty to get the **Modifier** (Mod). This
     includes ±1 for each distinct applicable Fact.
  2. Roll 2d6. A natural 12 (boxcars) is always a **Crit**; a natural 2 (snake-eyes)
     is always a **Fumble**. Otherwise, add the Mod and compare to the result table.

  | Result | Score | Effect |
  |--------|-------|--------|
  | Crit   | ≥12   | Perfect or dramatic triumph |
  | Pass   | 8–11  | Success |
  | Seven  | 7     | Mixed outcome with side-effects |
  | Failure | 3–6  | Failure and/or consequences |
  | Fumble | ≤2    | Severe or catastrophic failure |

  **Binary Saves**: When a simple yes/no check is needed, Crit/Pass/Seven = success;
  Failure/Fumble = failure.
related_rule: "core/saves"
