name: Action
tags: [core, mechanics]
summary: "Any discrete action taken in-game by an actor; may be instant or extended with a Duration."
definition: |
  An Action is any discrete undertaking by a character or Faction. Actions can be long or short-term;
  they may involve a chance of failure (and if they do, probably invoke a Save).

  Actions may be **instant** or **extended**:

  - An **instant** Action resolves in a single Turn or less.
  - An **extended** Action has a **Duration** set over a period of time, often days or
    months long; until the Duration elapses, the character dedicates their time to
    continuing the Action and cannot perform other extended Actions.

  Characters who lead Factions may oversee their Faction performing an Action instead of
  taking Actions personally. If there is no Action for what you want to do, the GM determines
  reasonable outcomes; recurring needs may prompt the GM to construct new Actions.
related_rule: "core/actions"
see_also: [save, fact, faction]
