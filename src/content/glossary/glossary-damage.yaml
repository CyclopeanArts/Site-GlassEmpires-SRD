name: Damage
tags: [core, mechanics, combat]
summary: "HP loss from hostile sources — 1 HP per point of Damage. May have one or more damage Types."
definition: |
  Characters lose 1 HP per point of **Damage** dealt to them. Damage may have
  one or more **Types** (Acid, Electric, Ice, Fire, Mind, Physical, Poison).

  If a character is reduced to less than 0 HP, the character is
  **Incapacitated**. When a character becomes Incapacitated or takes
  additional Damage while already Incapacitated, if their current negative HP
  exceeds their Power, they die.

  **Armor Points (AP)** absorb Damage before it reaches HP. Damage spilling
  past depleted AP is subtracted from HP directly.

  **Typeless Damage** has no Type specified and cannot be resisted.

  If a source of Damage has more than one Type (e.g., "6 Ice/Fire Damage"),
  the *weakest* resistance status the target has against any constituent Type
  is always used.
related_rule: "adventure/damage"
see_also: [damage-types, resistance, armor-points, incapacitated, hit-dice]
