name: Structural Hit Points
tags: [combat, siege, structures, core]
summary: "A measure of a Location's fortification troop capacity combined with its resilience to assault."
definition: |
  **Structural Hit Points** (SHP) measures two properties of a Location:

  - **Fortification troop capacity**: How many soldiers you can fit inside. A
    Location can *operationally* hold approximately 1 soldier per 1 SHP. This is
    a rough approximation — warehouses may hold up to 10 soldiers per SHP, while
    heavily fortified defensive structures like walls and sanctums hold fewer.

  - **Durability**: How resilient the Location is to assault. Structures cost
    $100 per SHP to construct or repair. Most structures are a mixture of *wood*
    and *stone*.

  **Structural Hardness**: Structures divide all Damage delivered via weapons of
  *inferior hardness* by 10. Hardness tiers, in ascending order:
  1. Wood, bone, copper
  2. Stone, keratin, bronze
  3. Iron, steel
  4. Gemstones

  Siege machines count as the toughest material used in their construction.
related_rule: "armies/siege"
