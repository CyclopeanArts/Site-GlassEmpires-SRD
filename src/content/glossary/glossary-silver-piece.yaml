name: Silver Piece
tags: [economy, equipment, core]
summary: "The smallest denomination of coin in circulation in Aia, representing one day of unskilled labor."
definition: |
  A **silver piece** ($1) represents *1 day of unskilled labor* and is the
  smallest denomination of coin in circulation on Aia. Most things are paid for
  with debt, typically via the gift economy, rather than with coin directly.

  An asset's price in silver pieces is called its **Value**. While coinage
  exists, the actual medium of exchange in most communities is the gift economy
  — you are gifted what you need *today*, expecting that *tomorrow* you will
  return the favor. Travelers and transients are considered dishonorable because
  they cannot be held to the same standard of reciprocity.

  If you need to track a debt explicitly, use the Debt system.

  When converting prices from other game systems, find the daily labor-value and
  convert based on that ratio. Be warned that many game designers have little
  grasp of economics; their assumptions may not hold steady across systems or
  settings.
related_rule: "money"
see_also: [debt, value, gift-economy, marketplace, equipment]
