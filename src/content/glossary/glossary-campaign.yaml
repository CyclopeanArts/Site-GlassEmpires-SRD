name: Campaign
tags: [core, gm, campaign]
summary: "The framework of play, consisting of a calendar and a map depicting the region in which the game takes place."
definition: |
  A **campaign** consists of two essential components:

  **Calendar**: Required to keep track of Deadlines for Moves and to synchronize
  all Players with the current state of the world. Ideally, a private/public
  calendar split should be set up so the current date is accessible to both the
  GM and the Players. On Aia, the calendar has 360 days per year, 12 months of
  30 days each, 4 weeks per month. The current year is 1002.

  **Map**: The area in which play happens. Any scale is acceptable so long as
  you have a scale measured in miles. Glass Empires requires no strict hex grid;
  measurements are made with a marked straightedge. A land area at least
  rivaling Hokkaidō, Japan (~50,000 square miles) is recommended. The map must
  track Locations, Roads (paved and unpaved), Terrain types, and the positions
  of mobile parties such as armies.

  Together, the calendar and map provide the temporal and spatial framework
  within which all strategic play — Faction Moves, army movements, resource
  flows, and seasonal events — unfolds.
related_rule: "adventure"
