name: Creeping Cap
tags: [plant, poison, undead-maker, fungus, misty-mountains]
summary: "Silent man-killing mushroom."
hd: 2
armor: 0
damagemultiplier: 0.25
size: 5
weight: 9
maxload: 6
speeds:
  run: 5
group: "1d6 sprout / 3d6 bloom"
desc: "Man-sized white bell-capped mushroom, thin like an umbrella on gliding millipede mycelium feet. Silent, except for the *thoomp* of its cap snapping up to infect."
wants: "Corpses, fresh or not."
intellect: "Can follow scents like a bloodhound. Dim awareness of chokepoints and hiding spots."
morality: "None."
features:
  - name: "Silent Samba"
    text: "You can move absolutely silently (excepting gear)."
    combat: 0
  - name: "Sporeburst"
    text: |
      Poisonous spores grow under the bellcap attached to your head. When within 5' of a living animal, the bellcap automatically snaps up like a broken umbrella and releases a poisonous black cloud. The cloud starts as a 10' radius cloud centered on you and expands in radius by 5' per Round, up to 30'. It lingers for an hour.
      - Any breathing creature within the cloud takes 4 Poison Damage at the start of each of their Turns. If they die from this poison, their corpse sprouts 1d6 Creeping Caps in 1d6 days.
      - After this Feature is triggered, unless you have a fresh corpse to feed from, you die in 1 day.
    combat: 1
  - name: "Creeping Cap Resistances"
    text: "Immune to Poison; resistant to Ice; weak to Fire."
    combat: 0.5
lore: |
  There is little worse than waking up to find several "creepers" sitting outside your home's every exit, waiting for your door to open. A single mushroom can sit there for *weeks* before dropping dead. They prefer cornering prey in burrows, caves, or other tight spaces where they can't escape.
treasure: "Creeping Cap stalks are a delicacy worth $500 each."
when_eaten:
  flavor: "Earthy, fungal, with an umami depth like aged mushroom. Slightly numbing."
  notes: "Stalks are a delicacy worth $500 each. Eating the cap causes 7 Poison Damage (Save for half)."
tables:
  - label: "Mushroom Omens & Hiding Spots"
    die: d6
    entries:
      - roll: 1
        result: |
          **Omen**: Old soldiers' corpses blooming in a field.
          **Hiding Spot**: Just inside a shadowed alcove.
      - roll: 2
        result: |
          **Omen**: Mycelial floor coating.
          **Hiding Spot**: Under dense evergreens.
      - roll: 3
        result: |
          **Omen**: Drained and shriveled husks of fauna.
          **Hiding Spot**: Hidden by bushes, atop a dead elk.
      - roll: 4
        result: |
          **Omen**: Black "dust" coating an empty home.
          **Hiding Spot**: Near the entrance to a cave.
      - roll: 5
        result: |
          **Omen**: Split-open skulls, dotted with fungal melt.
          **Hiding Spot**: Planted alongside a dirt road.
      - roll: 6
        result: | 
          **Omen**: Quiet den, fungus-eaten cubs.
          **Hiding Spot**: Huddled around a building.
