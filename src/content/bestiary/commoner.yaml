  - label: "Surname Convention"
    die: 2d6
    entries:
      - roll: 2
        max: 3
        result: "**Debt.** Embarrassing outstanding obligation. \"Fen Owes-the-Shrine.\""
      - roll: 4
        result: "**Ancestor.** Named for a supposedly embodied ancestor. Roll again for regular name. \"Aster Pearl.\""
      - roll: 5
        result: "**Deed.** Something they or an ancestor did. \"Ward Bridgebuilder,\" \"Flint Pigkiller.\" Almost never chosen; imposed by the community."
      - roll: 6
        result: "**None.** Just a given name."
      - roll: 7
        result: "**Family trade.** \"Breck Cooper\" or \"Dusk Dyer.\" Family trade changes, but names don't, which causes confusion."
      - roll: 8
        result: "**Village.** \"Keel of Oxbow\" or \"Sedge Millford.\" Used mainly by people who've moved. Marks you as an outsider wherever you go except home."
      - roll: 9
        result: "**Beast.** Named for a creature. \"Hart Boar.\" \"Lark Crane.\" May be subtly mutated to resemble it from extensive dynastic ritual consumption."
      - roll: 10
        result: "**Patronymic.** \"Gale Fernson\" or \"Cress Tamson.\" Roll again for father's name and append \"-son\"."
      - roll: 11
        max: 12
        result: "**Landmark.** \"Tor Cliff\" or \"Glen Ford.\" Implies the family *is* that place; they maintain it, they're responsible for it, and they'd die for it."
  - label: "Commoner Problems"
    die: d66
    entries:
      - roll: 11
        max: 12
        result: "Son (or daughter) conscripted by force."
      - roll: 13
        max: 14
        result: "Daughter ran off with a merc company. She *chose* to go. Parents furious, ashamed."
      - roll: 15
        max: 16
        result: "Creditor calling in debts the family can't pay. Debt slavery may be forced."
      - roll: 21
        max: 22
        result: "Kid found a staircase in a dry well. Has started sleepwalking toward it."
      - roll: 23
        max: 24
        result: "Bandits on the road demanding tolls. Too organized to be desperate."
      - roll: 25
        max: 26
        result: "Neighbor accused of feeding an evil spirit. Village split on topic of exile."
      - roll: 31
        max: 32
        result: "Local magistrate vanished a week ago during water rights crisis."
      - roll: 33
        max: 34
        result: "Harpy courier wrongly delivered letter with *dangerous* contents."
      - roll: 35
        max: 36
        result: "Family member ate something bad and is mutating. Won't discuss what."
      - roll: 41
        max: 42
        result: "Way too many daughters and nobody to marry them to."
      - roll: 43
        max: 44
        result: "Soldiers quartered in the village refuse to leave. Eating everything."
      - roll: 45
        max: 46
        result: "Cow dying of a disease. Herbalist and Jester disagree how; both want payment."
      - roll: 51
        max: 52
        result: "Someone's robbing grave offerings. The dead are restless. Help!"
      - roll: 53
        max: 54
        result: "The wind spirit won't move the windmill anymore. Says the contract is void!"
      - roll: 55
        max: 56
        result: "Fire destroyed the granary. There's no reserves."
      - roll: 61
        max: 62
        result: "Strangers are lurking and asking odd pointed questions. We're being cased!"
      - roll: 63
        max: 64
        result: "Two villages in a feud over a shared resource (ford, mill, grazing land). This commoner is trying to broker peace before it turns bloody."
      - roll: 65
        max: 66
        result: "Something in the forest ate our horses. The tracks are strange."
  - label: "Mood and Demeanor"
    die: d66
    entries:
      - roll: 11
        max: 12
        result: "**Grim endurance.** Treats the war like weather. Terrible, inevitable, endured."
      - roll: 13
        max: 14
        result: "**Manic commerce.** Selling everything not nailed down while coins still matter."
      - roll: 15
        max: 16
        result: "**Doubled faith.** Tripled offerings to the spirits. Judges anyone impious."
      - roll: 21
        max: 22
        result: "**Simmering fury.** At the current lord, at the war, at armed strangers, at *everything*."
      - roll: 23
        max: 24
        result: "**Performing fine.** Insists everything is normal. Smile doesn't reach the eyes."
      - roll: 25
        max: 26
        result: "**Drunk all day.** Still working, but starting to fray around the edges."
      - roll: 31
        max: 32
        result: "**Deep suspicion.** Asks questions. Watching your hands. Counting your weapons."
      - roll: 33
        max: 34
        result: "**Desperate hospitality.** Overfeeding you. Insisting you stay. Lonely and terrified."
      - roll: 35
        max: 36
        result: "**Bitter clarity.** Too smart for hope. Brilliant and ambitious if you can motivate them."
      - roll: 41
        max: 42
        result: "**Gossip engine.** Everything you say is transmitted to everyone within a day's walk."
      - roll: 43
        max: 44
        result: "**Scheming.** Working an angle. Sizing you up for usefulness and mark-status."
